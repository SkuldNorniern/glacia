name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: glacia
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: glacia
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: glacia.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libvulkan-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxkbcommon-dev pkg-config libegl-mesa0 libgtk-3-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package and checksum
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          ARCHIVE=glacia-${{ github.ref_name }}-${{ matrix.target }}

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mkdir -p dist
            cp "$BINARY" dist/
            cd dist && 7z a "../${ARCHIVE}.zip" ${{ matrix.artifact }} && cd ..
            sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            # Build .icns from PNG assets
            mkdir -p Glacia.iconset
            sips -z 16 16   assets/glacia-term-icon.png   --out Glacia.iconset/icon_16x16.png
            sips -z 32 32   assets/glacia-term-icon.png   --out Glacia.iconset/icon_16x16@2x.png
            sips -z 32 32   assets/glacia-term-icon.png   --out Glacia.iconset/icon_32x32.png
            sips -z 64 64   assets/glacia-term-icon.png   --out Glacia.iconset/icon_32x32@2x.png
            sips -z 128 128 assets/glacia-term-icon.png   --out Glacia.iconset/icon_128x128.png
            sips -z 256 256 assets/glacia-term-icon-256.png --out Glacia.iconset/icon_128x128@2x.png
            sips -z 256 256 assets/glacia-term-icon-256.png --out Glacia.iconset/icon_256x256.png
            sips -z 512 512 assets/glacia-term-icon-512.png --out Glacia.iconset/icon_256x256@2x.png
            sips -z 512 512 assets/glacia-term-icon-512.png --out Glacia.iconset/icon_512x512.png
            iconutil -c icns Glacia.iconset -o packaging/macos/glacia.icns
            # Assemble .app bundle
            mkdir -p Glacia.app/Contents/MacOS
            mkdir -p Glacia.app/Contents/Resources
            cp "$BINARY" Glacia.app/Contents/MacOS/glacia
            cp packaging/macos/Info.plist Glacia.app/Contents/
            cp packaging/macos/glacia.icns Glacia.app/Contents/Resources/
            chmod +x Glacia.app/Contents/MacOS/glacia
            plutil -lint Glacia.app/Contents/Info.plist
            codesign --force --deep --sign - Glacia.app
            codesign --verify --deep --strict --verbose=2 Glacia.app
            # Create DMG
            hdiutil create -volname "Glacia" -srcfolder Glacia.app \
              -ov -format UDZO "${ARCHIVE}.dmg"
            sha256sum "${ARCHIVE}.dmg" > "${ARCHIVE}.dmg.sha256"
          else
            mkdir -p dist
            cp "$BINARY" dist/
            tar -czf "${ARCHIVE}.tar.gz" -C dist .
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glacia-${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
            *.dmg
            *.dmg.sha256
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          RANGE="${PREV_TAG:+${PREV_TAG}..HEAD}"
          [ -z "$PREV_TAG" ] && RANGE="HEAD"

          section() {
            git log "$RANGE" --pretty=format:"%s" \
              | grep -E "^${1}(\([^)]*\))?: " \
              | sed -E "s/^${1}(\([^)]*\))?: /- /" \
              || true
          }

          FEATS=$(section feat)
          FIXES=$(section fix)
          DOCS=$(section docs)
          REFACTORS=$(section refactor)
          CI=$(section ci)
          OTHERS=$(git log "$RANGE" --pretty=format:"%s" \
            | grep -Ev "^(feat|fix|docs|refactor|ci|chore|style|test|perf|build)(\([^)]*\))?: " \
            || true)

          {
            echo "## What's Changed"
            echo ""
            if [ -n "$FEATS" ];     then echo "### Features";      echo "$FEATS";     echo ""; fi
            if [ -n "$FIXES" ];     then echo "### Bug Fixes";     echo "$FIXES";     echo ""; fi
            if [ -n "$DOCS" ];      then echo "### Documentation"; echo "$DOCS";      echo ""; fi
            if [ -n "$REFACTORS" ]; then echo "### Refactor";      echo "$REFACTORS"; echo ""; fi
            if [ -n "$CI" ];        then echo "### CI";            echo "$CI";        echo ""; fi
            if [ -n "$OTHERS" ];    then echo "### Other";         echo "$OTHERS" | sed 's/^/- /'; echo ""; fi
          } > CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: find artifacts -name "*.sha256" -exec cat {} \; | sort > checksums.sha256

      - name: Publish release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          title: "Glacia ${{ github.ref_name }}"
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.dmg
            checksums.sha256

      - name: Update release notes with changelog and downloads table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            cat CHANGELOG.md
            echo ""
            echo "---"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File | SHA256 |"
            echo "|----------|------|--------|"
            while read -r hash file; do
              case "$file" in
                *linux*)   platform="Linux x86_64"   ;;
                *darwin*)  platform="macOS ARM64"     ;;
                *windows*) platform="Windows x86_64"  ;;
                *)         platform="Other"            ;;
              esac
              echo "| $platform | \`$file\` | \`${hash:0:16}...\` |"
            done < checksums.sha256
          } > notes.md
          gh release edit ${{ github.ref_name }} --notes-file notes.md
